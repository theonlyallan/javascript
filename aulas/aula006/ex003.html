<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu primeiro programa em JS</title>
    <style>
        body {
            background-color: rgb(35, 99, 201);
            color: white;
            font: normal 20pt arial;
        }

        h1 {
            color: yellow
        }
    </style>

<h1>Olá, mundo !</h1>
<p>Me livrei da maldição.</p>

<body>
    <script>
        var n1 = Number(window.prompt('Digite um número ')) //String
        var n2 = Number(window.prompt("Digite outro número ")) //string
        var s = n1 + n2
        window.alert(`A soma entre ${n1} e ${n2} é igual ${s}`)
    // concatenação
    // + (number + number) para adição
    // + (string + string) para concatenação
    </script>
</body>
